<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini AI Assistant</title>
  <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}" />
</head>
<body>
  <nav>
    <div class="nav-brand">
      <h1>Mini AI Assistant</h1>
    </div>
  </nav>

  <main>
    <section class="content-grid">
      <div class="card" id="upload-card">
        <h2>Document Upload</h2>
        <div id="upload-area">
          <input type="file" id="file-input" accept=".pdf,.txt,.md" />
          <span id="upload-label">Upload PDF</span>
          <p id="upload-status">No document uploaded</p>
        </div>
      </div>

      <div class="card" id="ask-card">
        <h2>Ask AI</h2>
        <textarea id="question-input" rows="4" placeholder="Type your question here..."></textarea>
        <button id="send-btn">Ask</button>
      </div>
    </section>

    <section class="card" id="response-card">
      <h2>AI Response</h2>
      <div id="chat-box">
        <p class="placeholder">Upload a document and ask a question to get started.</p>
      </div>
    </section>

    <section class="card" id="sources-card">
      <details>
        <summary>Retrieved Sources</summary>
        <div id="sources-list"></div>
      </details>
    </section>
  </main>



  <script src="{{ url_for('static', path='js/app.js') }}"></script>
</body>
</html>
